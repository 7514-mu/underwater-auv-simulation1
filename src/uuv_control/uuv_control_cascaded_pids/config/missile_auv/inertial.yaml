# Missile AUV inertial parameters for PID controller
# mass = body_mass + average_added_mass
# body=200, added_mass diagonal avg ≈ (25+150+150)/3 ≈ 108
# Use effective mass per dominant axis: body + added_mass
/**:
  ros__parameters:
    pid:
      mass: 250.0
      inertial:
        ixx: 11.5
        ixy: 0
        ixz: 0
        iyy: 50.0
        iyz: 0
        izz: 50.0
